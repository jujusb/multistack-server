networks:
  caddy_net:
    external: true

services:
  caddy:
    image: caddy:2-built
    container_name: caddy
    restart: unless-stopped
    environment:
      MUSIC_SERVER_ADDRESS: ${MUSIC_SERVER_ADDRESS:-}
      KUNO_SERVER_ADDRESS: ${KUNO_SERVER_ADDRESS:-}
      TRANSLATE_SERVER_ADDRESS: ${TRANSLATE_SERVER_ADDRESS:-}
      MINECRAFT_DYNMAP_SERVER_ADDRESS: ${MINECRAFT_DYNMAP_SERVER_ADDRESS:-}
      MINECRAFT_ADMIN_SERVER_ADDRESS: ${MINECRAFT_ADMIN_SERVER_ADDRESS:-}
      VPN_ADMIN_SERVER_ADDRESS: ${VPN_ADMIN_SERVER_ADDRESS:-}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-}
      BASIC_AUTH_PASSWORD_HASH: ${BASIC_AUTH_PASSWORD_HASH:-}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./global-caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_root_data:/data
      - caddy_root_config:/config
    networks:
      - caddy_net

volumes:
  caddy_root_data:
  caddy_root_config:

